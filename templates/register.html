<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | LibraryPro Premium</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- Floating Theme Toggle (Standardised ID) -->
  <div id="theme-toggle" class="theme-toggle-fixed animate-up" title="Toggle Theme">
    <i class="bi bi-sun-fill theme-sun d-none"></i>
    <i class="bi bi-moon-stars-fill theme-moon"></i>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card premium-card animate-up">
      <div class="auth-header">
        <div class="sidebar-logo justify-content-center mb-2">
          <i class="bi bi-lightning-charge-fill"></i>
          <span>LibraryPro</span>
        </div>
        <h1>Create Account</h1>
        <p>Join our community of readers and librarians</p>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} border-0 small rounded-3 mb-4" role="alert">
        {{ msg }}
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="text-start mb-3">
          <label class="form-label fw-bold small ms-1">Full Name</label>
          <input type="text" name="name" class="form-control btn-pill bg-light border-0 px-4" placeholder="Enter your name" required />
        </div>

        <div class="row mb-3">
          <div class="col-6 text-start">
            <label class="form-label fw-bold small ms-1">Email</label>
            <input type="email" name="email" class="form-control btn-pill bg-light border-0 px-4" placeholder="name@email.com" required />
          </div>
          <div class="col-6 text-start">
            <label class="form-label fw-bold small ms-1">Password</label>
            <input type="password" name="password" class="form-control btn-pill bg-light border-0 px-4" placeholder="••••••••" required />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-6 text-start">
            <label class="form-label fw-bold small ms-1">Role</label>
            <select class="form-control btn-pill bg-light border-0 px-4" name="role" id="roleSelect">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="guest">Guest</option>
            </select>
          </div>
          <div class="col-6 text-start">
            <label class="form-label fw-bold small ms-1" id="dynamicIdLabel">Roll Number</label>
            <input type="text" name="unique_id" class="form-control btn-pill bg-light border-0 px-4" placeholder="STU999" required />
          </div>
        </div>

        <div class="text-start mb-4">
          <label class="form-label fw-bold small ms-1">Mobile Number</label>
          <input type="text" name="mobile" class="form-control btn-pill bg-light border-0 px-4" placeholder="+91 0000000000" required />
        </div>

        <button type="submit" class="btn-pill btn-primary-pill w-100 py-3 mb-3">
          Create Account
        </button>

        <div class="text-center">
          <span class="text-muted small">Already registered?</span>
          <a href="{{ url_for('login') }}" class="small fw-bold text-primary ms-1">Sign In</a>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/theme_toggle.js') }}"></script>
  <script>
    document.getElementById('roleSelect').addEventListener('change', function() {
      const label = document.getElementById('dynamicIdLabel');
      const input = document.getElementsByName('unique_id')[0];
      if (this.value === 'student') {
        label.innerText = 'Roll Number';
        input.placeholder = 'STU999';
      } else if (this.value === 'teacher') {
        label.innerText = 'Employee ID';
        input.placeholder = 'EMP123';
      } else {
        label.innerText = 'Unique Identifier';
        input.placeholder = 'GUEST-ID';
      }
    });
  </script>
</body>
</html>
