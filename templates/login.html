<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | LibraryPro Premium</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- Floating Theme Toggle (Standardised ID for Universal Sync) -->
  <div id="theme-toggle" class="theme-toggle-fixed animate-up" title="Toggle Theme">
    <i class="bi bi-sun-fill theme-sun d-none"></i>
    <i class="bi bi-moon-stars-fill theme-moon"></i>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card premium-card animate-up">
      <div class="auth-header">
        <div class="sidebar-logo justify-content-center mb-2">
          <i class="bi bi-lightning-charge-fill"></i>
          <span>LibraryPro</span>
        </div>
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your portal</p>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} border-0 small rounded-3 mb-4" role="alert">
        {{ msg }}
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="text-start mb-3">
          <label class="form-label fw-bold small ms-1">Email Address</label>
          <input type="email" name="email" class="form-control btn-pill bg-light border-0 px-4" placeholder="name@example.com" required />
        </div>
        
        <div class="text-start mb-4">
          <label class="form-label fw-bold small ms-1">Password</label>
          <input type="password" name="password" class="form-control btn-pill bg-light border-0 px-4" placeholder="Min. 8 characters" required />
        </div>

        <button type="submit" class="btn-pill btn-primary-pill w-100 py-3 mb-3">
          Sign In
        </button>

        <div class="text-center">
          <span class="text-muted small">Not registered yet?</span>
          <a href="{{ url_for('register') }}" class="small fw-bold text-primary ms-1">Create an account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/theme_toggle.js') }}"></script>
</body>
</html>
